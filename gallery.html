<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="description" content="Explore the ALC photo gallery, upload your own images, and browse member snapshots with a polished interface.">
  <title>ALC — Image Gallery</title>

  <!-- Bootstrap CSS (matching your site's version) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <link href="assets/site.css" rel="stylesheet">

  <!-- Optional: Bootstrap icons (used for buttons) -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">

  <!-- Gallery styles -->
  <link rel="stylesheet" href="assets/gallery.css">
  <script src="assets/auth.js" defer></script>
  <script>/* pre-check auth to avoid content flash */(function(){try{const p=window.location.pathname.replace(/^.*\//,'')||'gallery.html';if(p!=='login.html'&&!localStorage.getItem('alcwebMember')){const q='?redirect='+encodeURIComponent(p);location.replace('login.html'+q);} }catch(e){} })();</script>
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
    <div class="container">
      <a class="navbar-brand fw-bold text-uppercase" href="index.html">ALC Website</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
              aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link active" aria-current="page" href="gallery.html">Gallery</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="photos.html">Photos</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="credits.html">Credits</a>
          </li>
          <li class="nav-item">
            <a id="authLink" class="nav-link" href="profile.html">Profile</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container py-4">
    <div class="mb-5">
      <p class="section-title mb-2">Gallery</p>
      <h1 class="fw-bold">ALC Image Collection</h1>
      <p class="text-muted">Upload photos from your device, preview images in a modern viewer, and save snapshots instantly.</p>
    </div>

    <!-- Upload controls (note: uploads are client-only; they will not remove server images) -->
    <div class="card p-4 mb-4 shadow-sm border-0 bg-white">
      <div class="d-flex flex-column flex-md-row align-items-start gap-3 gap-md-4">
        <div>
          <label class="form-label mb-1">Add images</label>
          <input id="fileInput" type="file" accept="image/*" multiple class="form-control">
        </div>
        <div class="align-self-end">
          <button id="loadServer" type="button" class="btn btn-outline-primary">Load server images</button>
        </div>
      </div>
      <div id="dropArea" class="border rounded-3 mt-4 p-4 text-center text-muted">
        Drag & drop images here or use the file picker.
      </div>
    </div>

    <!-- Batch controls for server images (loads 25 at a time) -->
    <div id="batchControls" class="mb-4"></div>

    <!-- Gallery grid -->
    <div id="gallery" class="row g-3"></div>
  </main>

  <!-- Viewer modal -->
  <div class="modal fade" id="viewerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content bg-dark">
        <div class="modal-header border-0">
          <h5 id="viewerTitle" class="text-white fs-6 mb-0"></h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body text-center">
          <img id="viewerImage" src="" alt="" class="img-fluid rounded">
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS Bundle (includes Popper) -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

  <!-- Gallery script -->
  <script src="assets/gallery.js"></script>
</body>
</html>
