<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Log in to the ALC member area. Only approved members can access the site content.">
  <title>ALC Member Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/site.css" rel="stylesheet">
</head>
<body>
  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-body">
        <div class="mb-4">
          <span class="section-title">Member Access</span>
          <h1 class="h3 fw-bold mb-3">Sign in to ALC</h1>
          <p class="text-muted mb-0">Enter your member ID below. Passwords are not required at this time.</p>
        </div>

        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Member ID</label>
            <input id="username" name="username" type="text" class="form-control" autocomplete="username" required>
          </div>
          <div id="loginFeedback" class="text-danger mb-3" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>

        <hr>
        <p class="small mb-0">Only approved ALC members can access this site. Contact your administrator if you need membership help.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/auth.js"></script>
</body>
</html>
