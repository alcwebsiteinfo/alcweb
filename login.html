<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="description" content="Log in to the ALC member area. Only approved members can access the site content.">
  <title>ALC Member Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="assets/site.css" rel="stylesheet">
  <style>
    .login-wrapper {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      background: #eef3fb;
    }
    .login-card {
      max-width: 420px;
      width: 100%;
      border: 1px solid rgba(15, 23, 42, 0.08);
      border-radius: 1rem;
      box-shadow: 0 24px 60px rgba(15, 23, 42, 0.08);
    }
    .login-card .card-body {
      padding: 2rem;
    }
    .login-card small {
      color: #6c757d;
    }
  </style>
</head>
<body>
  <div class="login-wrapper">
    <div class="card login-card">
      <div class="card-body">
        <h1 class="h3 fw-bold mb-3">Member Login</h1>
        <p class="text-muted mb-4">Enter your member ID to access the ALC website.</p>

        <form id="loginForm">
          <div class="mb-3">
            <label for="username" class="form-label">Member ID</label>
            <input id="username" name="username" type="text" class="form-control" autocomplete="username" required>
          </div>
          <div id="loginFeedback" class="text-danger mb-3" aria-live="polite"></div>
          <button type="submit" class="btn btn-primary w-100">Log in</button>
        </form>

        <hr>
        <p class="small mb-0">If you are a member, use the correct credentials. Contact your site administrator if you need access.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/auth.js"></script>
</body>
</html>
